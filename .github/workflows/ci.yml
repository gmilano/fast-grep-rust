name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

# Least-privilege: CI only needs read access to clone the repo. No releases,
# no PR comments, no package writes. Pull requests from forks already get a
# read-only token by default, but we set this explicitly so a future change
# to the workflow can't accidentally inherit broader scopes.
permissions:
  contents: read

env:
  # Don't bake `target-cpu=native` into CI artifacts; CI runs on shared hardware
  # and there's no need to over-specialize. The local dev default in
  # `.cargo/config.toml` still applies for normal `cargo build`.
  RUSTFLAGS: ""
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --verbose
      - run: cargo test --locked --verbose

  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets -- -D warnings
        continue-on-error: true

  audit:
    name: cargo audit (deps CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Honors .cargo/audit.toml so we don't fail on triaged unmaintained-only
      # warnings. Real CVEs (vulnerability advisories) still fail the build.
      - run: cargo install cargo-audit --locked
      - run: cargo audit
